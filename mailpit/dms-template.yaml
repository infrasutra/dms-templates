version: "1"

name: mailpit
description: Mailpit is an email and SMTP testing tool for developers. It acts as an SMTP server, captures all outgoing email, and provides a web UI to inspect messages — no real emails are sent.
icon: https://avatars.githubusercontent.com/u/5161533?s=200&v=4
category: developer-tools
tags:
  - email
  - smtp
  - testing
  - devtools
  - mailpit

versions:
  - "v1.21"
  - "v1.20"
  - "v1.19"
defaultVersion: "v1.21"

services:
  - name: mailpit
    type: worker
    image: "axllent/mailpit:${VERSION}"
    ports:
      - port: 8025
      - port: 1025
    health_check:
      type: http
      path: /
      port: 8025
      initial_delay: 10
      interval: 10
      timeout: 5
      retries: 3
    cpu: 100
    memory: 128
    tcp_exposure:
      enabled: false
      hostname: "${NAME}-${STAGE}.${DOMAIN}"
      port: 8025
      tls:
        mode: terminate
      gateway:
        name: dms-gateway
        namespace: dms-system
