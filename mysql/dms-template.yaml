version: "1"

# Template metadata
name: mysql
description: MySQL is the world's most popular open-source relational database management system, known for its speed, reliability, and ease of use.
icon: https://raw.githubusercontent.com/docker-library/docs/master/mysql/logo.png
category: database
tags:
  - database
  - sql
  - relational
  - mysql

# Supported versions
versions:
  - "9"
  - "8.4"
  - "8.0"
defaultVersion: "9"

# Service definitions
services:
  - name: mysql
    type: worker
    image: "mysql:${VERSION}"
    ports:
      - port: 3306
    env:
      - key: MYSQL_ROOT_PASSWORD
        generator: password
        description: MySQL root user password
      - key: MYSQL_USER
        default: app
        configurable: true
        description: MySQL application user username
      - key: MYSQL_PASSWORD
        generator: password
        description: MySQL application user password
      - key: MYSQL_DATABASE
        default: app
        configurable: true
        description: Default database name to create
    volumes:
      - name: mysql-data
        path: /var/lib/mysql
        size: 10240
    health_check:
      type: exec
      command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      initial_delay: 30
      interval: 10
      timeout: 5
      retries: 3
    cpu: 200
    memory: 512
    tcp_exposure:
      enabled: false
      hostname: "${NAME}-${STAGE}.${DOMAIN}"
      port: 3306
      tls:
        mode: terminate
      gateway:
        name: dms-gateway
        namespace: dms-system
