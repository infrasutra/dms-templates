version: "1"

# Template metadata
name: postgres
description: PostgreSQL is a powerful, open-source object-relational database system with a strong reputation for reliability, feature robustness, and performance.
icon: https://raw.githubusercontent.com/docker-library/docs/master/postgres/logo.png
category: database
tags:
  - database
  - sql
  - relational
  - postgresql

# Supported versions
versions:
  - "18"
  - "17"
  - "16"
defaultVersion: "18"

# Service definitions
services:
  - name: postgres
    type: worker
    image: "postgres:${VERSION}-alpine"
    ports:
      - port: 5432
    env:
      - key: POSTGRES_USER
        default: postgres
        configurable: true
        description: PostgreSQL superuser username
      - key: POSTGRES_PASSWORD
        generator: password
        description: PostgreSQL superuser password
      - key: POSTGRES_DB
        default: app
        configurable: true
        description: Default database name to create
    volumes:
      - name: postgres-data
        path: /var/lib/postgresql/data
        size: 10240
    health_check:
      type: exec
      command: ["pg_isready", "-U", "postgres"]
      initial_delay: 10
      interval: 10
      timeout: 5
      retries: 3
    cpu: 100
    memory: 256
    tcp_exposure:
      enabled: false
      hostname: "${NAME}-${STAGE}.${DOMAIN}"
      port: 5432
      tls:
        mode: terminate
      gateway:
        name: dms-gateway
        namespace: dms-system
