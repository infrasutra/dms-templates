version: "1"

name: cockroachdb
description: CockroachDB is a distributed SQL database built on a transactional and strongly-consistent key-value store. It scales horizontally, survives disk, machine, rack, and even datacenter failures with minimal latency disruption and no manual intervention.
icon: https://raw.githubusercontent.com/cockroachdb/cockroach/master/docs/media/cockroach_db.png
category: database
tags:
  - database
  - sql
  - distributed
  - postgresql-compatible

versions:
  - "v26.1.4"
  - "v26.1.3"
  - "v26.1.2"
defaultVersion: "v26.1.4"

services:
  - name: cockroachdb
    type: worker
    image: "cockroachdb/cockroach:${VERSION}"
    command: ["/cockroach/cockroach"]
    args: ["start-single-node", "--insecure"]
    ports:
      - port: 26257
      - port: 8080
    env:
      - key: COCKROACH_DATABASE
        default: app
        configurable: true
        description: Default database name to create
    volumes:
      - name: cockroachdb-data
        path: /cockroach/cockroach-data
        size: 6144
    health_check:
      type: exec
      command: ["/cockroach/cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      initial_delay: 15
      interval: 15
      timeout: 5
      retries: 3
    cpu: 250
    memory: 512
    tcp_exposure:
      enabled: false
      hostname: "${NAME}-${STAGE}.${DOMAIN}"
      port: 26257
      tls:
        mode: terminate
      gateway:
        name: dms-gateway
        namespace: dms-system
